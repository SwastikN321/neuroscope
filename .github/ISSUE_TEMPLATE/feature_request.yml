name: Feature request
description: Suggest an improvement for NeuroScope.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What research or review workflow would this improve?
      placeholder: I want to compare annotations across...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like NeuroScope to do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - EEG parsing
        - Visualization
        - Annotation workflow
        - Deployment
        - Documentation
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other tools, workflows, or designs you considered?
