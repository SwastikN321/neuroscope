name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Compile backend
        run: python -m py_compile backend/main.py backend/eeg_loader.py
      - name: Smoke test parser
        run: |
          cd backend
          python - <<'PY'
          from eeg_loader import parse_eeg_csv

          with open("../sample_data/sample_eeg.csv", "rb") as sample:
              data = parse_eeg_csv(sample.read(), "sample_eeg.csv")

          assert data["metadata"]["channelCount"] == 6
          assert data["metadata"]["sampleCount"] == 31
          PY

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
