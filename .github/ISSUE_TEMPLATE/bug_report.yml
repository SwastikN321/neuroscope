name: Bug report
description: Report something that is broken or confusing.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve NeuroScope. Please do not attach private patient data or protected health information.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: The viewer fails when I upload...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the app
        2. Upload this kind of file
        3. Click...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Browser, OS, Python version, Node version, deployment platform
  - type: textarea
    id: data_context
    attributes:
      label: Data context
      description: File type, approximate channel count, sampling rate, and duration. Do not include sensitive data.
